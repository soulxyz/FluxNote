name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release_flag.outputs.released }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Releasing version: ${VERSION}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${TAG} already exists, skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${TAG} does not exist, proceeding."
          fi

      - name: Generate Changelog
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          CURRENT_TAG="v${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # 没有历史 tag，取所有提交
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
            COMPARE_URL="https://github.com/${REPO}/commits/${CURRENT_TAG}"
          else
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
            COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...${CURRENT_TAG}"
          fi

          # 过滤掉纯 Merge 提交
          COMMITS=$(echo "$COMMITS" | grep -v "^- Merge " || true)

          # 写入 changelog 文件（避免多行变量问题）
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- 版本更新"
            fi
            echo ""
            echo "**Full Changelog**: ${COMPARE_URL}"
          } > /tmp/changelog.md

          cat /tmp/changelog.md

      - name: Build release archive
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE_NAME="fluxnote-v${VERSION}"

          # 使用 git archive 打包（会自动应用 .gitattributes export-ignore 规则）
          git archive --format=zip --prefix="${ARCHIVE_NAME}/" -o "/tmp/${ARCHIVE_NAME}.zip" HEAD
          git archive --format=tar.gz --prefix="${ARCHIVE_NAME}/" -o "/tmp/${ARCHIVE_NAME}.tar.gz" HEAD

          echo "Archives created:"
          ls -lh /tmp/${ARCHIVE_NAME}.*

          # 计算 ZIP 包的 MD5 并追加到 release body
          ZIP_MD5=$(md5sum /tmp/${ARCHIVE_NAME}.zip | awk '{ print $1 }')
          echo "ZIP MD5: ${ZIP_MD5}"
          
          echo "" >> /tmp/changelog.md
          echo "### 校验信息" >> /tmp/changelog.md
          echo "\`MD5: ${ZIP_MD5}\`" >> /tmp/changelog.md

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "FluxNote ${{ steps.version.outputs.tag }}"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
          files: |
            /tmp/fluxnote-v${{ steps.version.outputs.version }}.zip
            /tmp/fluxnote-v${{ steps.version.outputs.version }}.tar.gz

      - name: Mark release success
        id: release_flag
        if: steps.tag_check.outputs.exists == 'false'
        run: echo "released=true" >> $GITHUB_OUTPUT

  windows-installer:
    name: Build Windows Installer
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW
        shell: cmd
        run: choco install mingw -y

      - name: Download Inno Setup Chinese language pack
        shell: cmd
        run: curl -L -o ChineseSimplified.isl https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl

      - name: Build embedded Python runtime
        shell: cmd
        run: |
          curl -L -o python-embed.zip https://www.python.org/ftp/python/3.12.2/python-3.12.2-embed-amd64.zip
          mkdir runtime
          tar -xf python-embed.zip -C runtime
          del python-embed.zip
          echo ..>> runtime\python312._pth
          echo import site>> runtime\python312._pth
          curl -L -o get-pip.py https://bootstrap.pypa.io/get-pip.py
          runtime\python.exe get-pip.py
          runtime\python.exe -m pip install -r requirements.txt

      - name: Slim down runtime
        shell: cmd
        run: |
          for /d /r runtime %%d in (__pycache__) do @if exist "%%d" rd /s /q "%%d" >nul 2>&1
          del /s /q "runtime\*.pyc" >nul 2>&1
          if exist "runtime\pip-cache" rd /s /q "runtime\pip-cache"

      - name: Compile C tray launcher
        shell: cmd
        run: |
          copy "app\static\favicon.ico" "logo.ico" /Y
          echo 1 ICON "logo.ico" > icon.rc
          windres icon.rc -o icon.o
          gcc packaging\launcher.c icon.o -o FluxNote.exe -mwindows

      - name: Rebrand Python runtime executable
        shell: cmd
        run: |
          rename "runtime\python.exe" "FluxNoteCore.exe"
          curl -L -o rcedit.exe https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe
          rcedit.exe "runtime\FluxNoteCore.exe" --set-version-string "FileDescription" "FluxNote 网络核心服务" --set-version-string "ProductName" "FluxNote" --set-version-string "CompanyName" "Soulxyz" --set-icon "logo.ico"

      - name: Compress runtime
        shell: cmd
        run: tar.exe -a -c -f runtime.zip runtime

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DAppVer=${{ needs.release.outputs.version }} packaging\setup.iss

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: Output/FluxNote_Setup_v${{ needs.release.outputs.version }}.exe
