<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <!-- App 图标基底渐变 (经典效率蓝) -->
        <linearGradient id="appBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6"/> <!-- Tailwind Blue 500 -->
            <stop offset="100%" stop-color="#1D4ED8"/> <!-- Tailwind Blue 700 -->
        </linearGradient>

        <!-- 折角的自然过渡渐变 -->
        <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#E2E8F0"/>
        </linearGradient>

        <!-- 内部模块化笔记块的现代蓝色渐变 -->
        <linearGradient id="blockGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#2563EB"/>
        </linearGradient>

        <!-- 主文档的柔和下拉阴影 -->
        <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.25"/>
        </filter>

        <!-- 折角的局部投影 -->
        <filter id="foldShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-4" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.15"/>
        </filter>
    </defs>

    <!-- 背景区块 (如需透明底色 Logo，可以直接删除此组) -->
    <g id="app-bg">
        <rect width="512" height="512" rx="112" fill="url(#appBg)"/>
    </g>

    <!-- 底层叠加笔记 (表达多文档、层叠感) -->
    <!-- 向右微转的半透明层 -->
    <g transform="rotate(8 256 256)">
        <path d="M 164 120 H 310 L 380 190 V 370 A 24 24 0 0 1 356 394 H 164 A 24 24 0 0 1 140 370 V 144 A 24 24 0 0 1 164 120 Z" fill="#FFFFFF" opacity="0.2"/>
    </g>
    
    <!-- 向左微转的半透明层 -->
    <g transform="rotate(-4 256 256)">
        <path d="M 164 120 H 310 L 380 190 V 370 A 24 24 0 0 1 356 394 H 164 A 24 24 0 0 1 140 370 V 144 A 24 24 0 0 1 164 120 Z" fill="#FFFFFF" opacity="0.35"/>
    </g>

    <!-- 核心主文档 (纯白极简风格) -->
    <g id="front-note" filter="url(#noteShadow)">
        <!-- 纸张主体 -->
        <path d="M 164 120 H 310 L 380 190 V 370 A 24 24 0 0 1 356 394 H 164 A 24 24 0 0 1 140 370 V 144 A 24 24 0 0 1 164 120 Z" fill="#FFFFFF"/>
        <!-- 右上角翻折页 -->
        <path d="M 310 120 V 166 A 24 24 0 0 0 334 190 H 380 Z" fill="url(#foldGrad)" filter="url(#foldShadow)"/>
    </g>

    <!-- 现代模块化区块 (Modular Flex Blocks) - 完全替代线条 -->
    <g id="flex-blocks" fill="url(#blockGrad)">
        <!-- 第一行排版 -->
        <rect x="196" y="196" width="76" height="28" rx="14" />
        <rect x="284" y="196" width="56" height="28" rx="14" fill-opacity="0.25" />

        <!-- 第二行排版 -->
        <rect x="196" y="244" width="48" height="28" rx="14" fill-opacity="0.25" />
        <rect x="256" y="244" width="88" height="28" rx="14" />

        <!-- 第三行排版 -->
        <rect x="196" y="292" width="112" height="28" rx="14" />
    </g>
</svg>