<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site_desc }}">
    {% block meta %}{% endblock %}
    <title>{% block title %}{{ site_title }}{% endblock %}</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/lib/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/static/css/blog.css">

    <!-- Markdown Support -->
    <script src="/static/lib/marked/marked.min.js"></script>
    <script src="/static/lib/dompurify/purify.min.js"></script>

    <!-- Syntax Highlighting -->
    <link rel="stylesheet" href="/static/lib/highlightjs/github.min.css">
    <script src="/static/lib/highlightjs/highlight.min.js"></script>

    <!-- Mermaid Diagrams -->
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>

    <!-- Viewer.js for Image Zoom -->
    <link rel="stylesheet" href="/static/lib/viewerjs/viewer.min.css">
    <script src="/static/lib/viewerjs/viewer.min.js"></script>

    {% block head %}{% endblock %}
</head>
<body>
    <div class="blog-layout">
        <!-- Header -->
        <header class="blog-header">
            <div class="blog-header-inner">
                <a href="{{ url_for('blog.index') }}" class="blog-brand">{{ site_title }}</a>
                <nav class="blog-nav">
                    <a href="{{ url_for('blog.index') }}" class="blog-nav-item{% if request.endpoint == 'blog.index' %} active{% endif %}">
                        <i class="fas fa-home"></i> 首页
                    </a>
                    <a href="{{ url_for('blog.archive') }}" class="blog-nav-item{% if request.endpoint == 'blog.archive' %} active{% endif %}">
                        <i class="fas fa-archive"></i> 归档
                    </a>
                    <a href="{{ url_for('blog.tags') }}" class="blog-nav-item{% if request.endpoint == 'blog.tags' %} active{% endif %}">
                        <i class="fas fa-tags"></i> 标签
                    </a>
                    <a href="{{ url_for('main.login_page') }}" class="blog-nav-item blog-login-link">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </a>
                </nav>
                <button class="blog-mobile-menu-btn" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </header>

        <!-- Mobile Menu -->
        <nav class="blog-mobile-nav" id="mobileNav">
            <a href="{{ url_for('blog.index') }}" class="blog-nav-item">首页</a>
            <a href="{{ url_for('blog.archive') }}" class="blog-nav-item">归档</a>
            <a href="{{ url_for('blog.tags') }}" class="blog-nav-item">标签</a>
            <a href="{{ url_for('main.login_page') }}" class="blog-nav-item">登录</a>
        </nav>

        <!-- Main Content -->
        <main class="blog-main">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="blog-footer">
            <div class="blog-footer-inner">
                <p>{{ blog_footer | default('由 <a href="/">流光笔记</a> 提供支持') | safe }}</p>
            </div>
        </footer>
    </div>

    <!-- Markdown Renderer Module -->
    <script type="module">
        import { renderContent, initMarkdownRenderer } from '/static/js/markdown-renderer.js';

        // 初始化渲染器
        initMarkdownRenderer();

        // 暴露到全局作用域供模板使用
        window.renderContent = renderContent;
        window._markdownRendererReady = true;

        // 触发就绪事件
        window.dispatchEvent(new Event('markdown-renderer-ready'));
    </script>
    <script>
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const nav = document.getElementById('mobileNav');
            nav.classList.toggle('open');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
