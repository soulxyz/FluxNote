<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_code }} - {{ site_title | default('流光笔记') }}</title>
    <link rel="stylesheet" href={{ static_v("lib/fontawesome/css/all.min.css") }}>
    <style>
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --primary-light: #D1FAE5;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--slate-50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--slate-600);
            overflow: hidden;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
        }

        .bg-circle-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--primary-light) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            animation: float1 20s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #FEF3C7 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: float2 15s ease-in-out infinite;
        }

        .bg-circle-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #DBEAFE 0%, transparent 70%);
            top: 50%;
            left: 10%;
            animation: float3 18s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, 30px) rotate(5deg); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, -20px) rotate(-5deg); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, 20px); }
        }

        /* 浮动图标 */
        .floating-icons {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-icon {
            position: absolute;
            font-size: 24px;
            color: var(--slate-300);
            animation: iconFloat 6s ease-in-out infinite;
        }

        .floating-icon:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
        .floating-icon:nth-child(2) { top: 25%; right: 15%; animation-delay: 1s; }
        .floating-icon:nth-child(3) { bottom: 20%; left: 15%; animation-delay: 2s; }
        .floating-icon:nth-child(4) { bottom: 30%; right: 10%; animation-delay: 0.5s; }
        .floating-icon:nth-child(5) { top: 60%; left: 5%; animation-delay: 1.5s; }
        .floating-icon:nth-child(6) { top: 40%; right: 5%; animation-delay: 2.5s; }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 0.6; }
        }

        /* 主容器 */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px 60px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
            max-width: 440px;
            margin: 20px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: 88px;
            font-weight: 700;
            line-height: 1;
            color: var(--slate-500);
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .error-divider {
            width: 48px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
            margin: 20px auto;
        }

        .error-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--slate-600);
            margin-bottom: 8px;
        }

        .error-message {
            font-size: 0.95rem;
            color: var(--slate-500);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .error-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--slate-100);
            color: var(--slate-600);
        }

        .btn-secondary:hover {
            background: var(--slate-200);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .error-container {
                padding: 40px 30px;
                margin: 15px;
            }
            .error-code {
                font-size: 72px;
            }
            .error-actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>

    <!-- 浮动图标 -->
    <div class="floating-icons">
        <i class="fas fa-file-alt floating-icon"></i>
        <i class="fas fa-tag floating-icon"></i>
        <i class="fas fa-bookmark floating-icon"></i>
        <i class="fas fa-folder floating-icon"></i>
        <i class="fas fa-edit floating-icon"></i>
        <i class="fas fa-search floating-icon"></i>
    </div>

    <div class="error-container">
        <div class="error-code">{{ error_code }}</div>
        <div class="error-divider"></div>
        <h1 class="error-title">{{ error_message }}</h1>
        <p class="error-message">别担心，让我们帮你回到正轨</p>

        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <button onclick="history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 返回上页
            </button>
        </div>
    </div>
</body>
</html>
