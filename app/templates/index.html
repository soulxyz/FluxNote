
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光笔记 - 记录生活</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/lib/fontawesome/css/all.min.css">
    <!-- Markdown Support -->
    <script src="/static/lib/marked/marked.min.js"></script>
    <script src="/static/lib/dompurify/purify.min.js"></script>
    <!-- Syntax Highlighting -->
    <link rel="stylesheet" href="/static/lib/highlightjs/github.min.css">
    <script src="/static/lib/highlightjs/highlight.min.js"></script>
    
    <!-- Mermaid Diagrams -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>

    <script>
        // Configure Marked
        marked.use({
            gfm: true,
            breaks: true
        });

        // Configure Highlight.js
        hljs.configure({ ignoreUnescapedHTML: true });
        
        // Configure Mermaid
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({ startOnLoad: false, theme: 'default' });
            }
        });
    </script>

    <!-- Viewer.js for Image Zoom -->
    <link rel="stylesheet" href="/static/lib/viewerjs/viewer.min.css">
    <script src="/static/lib/viewerjs/viewer.min.js"></script>
</head>
<body>
    <div class="app-layout" id="appLayout">
        <div class="app-container">
            <!-- 侧边栏 -->
            <aside class="sidebar" id="sidebar">
                <!-- Toggle Button -->
                <button class="sidebar-toggle-btn" id="sidebarToggle" title="收起侧边栏">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <!-- 1. 顶部：博客标题/用户信息 (访客看博客名，博主看自己信息) -->
                <div class="sidebar-header">
                   <div class="blog-brand" id="blogBrand">
                       <h1 class="blog-title">流光笔记</h1>
                       <p class="blog-desc">记录思维的碎片</p>
                   </div>

                   <div class="user-profile-compact" id="userProfile" style="display:none;">
                        <div class="user-meta">
                            <span class="username-large" id="userName">User</span>
                            <span class="pro-badge">OWNER</span>
                        </div>
                        <div class="user-actions-mini">
                             <a href="#" id="bindWebAuthnBtn" title="绑定指纹/面容登录"><i class="fas fa-fingerprint"></i></a>
                             <a href="/settings" title="设置"><i class="fas fa-cog"></i></a>
                             <a href="#" id="logoutBtn" title="退出"><i class="fas fa-sign-out-alt"></i></a>
                        </div>
                   </div>
                </div>

                <!-- 2. 统计 & 热力图 (总是显示，作为博客装饰) -->
                <div class="stats-panel" id="statsSection">
                    <div class="stats-row">
                        <div class="stat-item">
                            <span class="stat-num" id="statNoteCount">0</span>
                            <span class="stat-label">笔记</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" id="statTagCount">0</span>
                            <span class="stat-label">标签</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" id="statDayCount">0</span>
                            <span class="stat-label">活跃天</span>
                        </div>
                    </div>
                    <!-- 热力图 -->
                    <div id="heatmapGrid" class="heatmap-grid-compact"></div>
                </div>

                <!-- 3. 导航菜单 -->
                <nav class="sidebar-nav">
                    <!-- 通用菜单 -->
                    <a href="#" class="nav-item active" id="navAllNotes" onclick="return false;">
                        <i class="fas fa-layer-group"></i> 全部内容
                    </a>

                    <!-- 博主专属菜单 (默认隐藏) -->
                    <div id="ownerNav" style="display:none;">
                        <a href="#" class="nav-item" onclick="return false;">
                            <i class="fab fa-weixin"></i> 微信输入
                        </a>
                        <a href="#" class="nav-item" id="navDailyReview" onclick="return false;">
                            <i class="fas fa-history"></i> 每日回顾
                        </a>
                        <a href="#" class="nav-item" id="navShares" onclick="return false;">
                            <i class="fas fa-share-alt"></i> 我的分享
                        </a>
                        <a href="#" class="nav-item" id="navTrash" onclick="return false;">
                            <i class="fas fa-trash"></i> 回收站
                        </a>
                    </div>
                </nav>

                <!-- 4. 标签列表 -->
                <div class="sidebar-section tags-section">
                    <h3 class="section-title">话题 / 标签</h3>
                    <div class="filter-tags-list">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 5. 底部低调的登录入口 -->
                <div class="sidebar-footer" id="guestFooter" style="margin-top: auto; padding: 20px 0 0 0;">
                    <a href="#" class="nav-item guest-login-btn" id="showLoginBtn" onclick="return false;">
                        <i class="fas fa-fingerprint"></i> 博主登录
                    </a>
                    <!-- 隐藏注册按钮 -->
                    <button id="showRegisterBtn" style="display:none;">注册</button>
                </div>
            </aside>

            <!-- 主内容区 -->
            <main class="main-stream">
            <!-- 顶部栏 -->
            <header class="main-header">
                <div class="header-left">
                    <button id="mobileMenuBtn" class="mobile-menu-btn" title="菜单"><i class="fas fa-bars"></i></button>
                    <span id="currentDateDisplay">...</span>
                </div>
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索...">
                </div>
            </header>

            <!-- Banner 已移除，保持清爽 -->
            <div id="welcomeSection" style="display:none;"></div>

            <!-- 登录提示已移除 -->
            <div id="authActions" style="display:none;"></div>
            <div id="loginPrompt" style="display:none;"></div>

            <!-- 笔记输入框 (仅登录可见) -->
            <div class="memo-editor" id="noteInputSection" style="display: none;">
                <textarea id="noteContent" placeholder="现在的想法是..."></textarea>

                <div class="editor-footer">
                    <div class="editor-tools">
                        <button class="tool-btn" id="toggleTagInputBtn" title="插入标签 (Ctrl+#)"><i class="fas fa-hashtag"></i></button>
                        <input type="text" id="tagInput" class="tag-input-inline" placeholder="输入标签按回车..." style="display:none;">
                        <button class="tool-btn" title="上传图片"><i class="far fa-image"></i></button>
                        <!-- AI 按钮由 JS 插入 -->
                        <div class="input-controls" style="display:inline-block;"></div>
                    </div>
                    <div class="editor-actions">
                         <div class="public-switch">
                            <input type="checkbox" id="noteIsPublic">
                            <label for="noteIsPublic" title="设为公开"><i class="fas fa-globe-americas"></i></label>
                        </div>
                        <button id="saveNote" class="btn-send" title="记录">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <!-- 快捷标签选择区 -->
                <div id="tagsList" class="tags-bar"></div>
            </div>

            <!-- 笔记流 -->
            <div id="notesList" class="notes-stream">
                <!-- Static Skeleton for immediate feedback -->
                <div class="note-card skeleton-card">
                    <div class="skeleton-header" style="width: 30%;"></div>
                    <div class="skeleton-content"></div>
                    <div class="skeleton-content" style="width: 80%;"></div>
                    <div class="skeleton-content" style="width: 60%;"></div>
                </div>
                <div class="note-card skeleton-card">
                    <div class="skeleton-header" style="width: 30%;"></div>
                    <div class="skeleton-content"></div>
                    <div class="skeleton-content" style="width: 80%;"></div>
                    <div class="skeleton-content" style="width: 60%;"></div>
                </div>
                <div class="note-card skeleton-card">
                    <div class="skeleton-header" style="width: 30%;"></div>
                    <div class="skeleton-content"></div>
                    <div class="skeleton-content" style="width: 80%;"></div>
                    <div class="skeleton-content" style="width: 60%;"></div>
                </div>
            </div>
            </main>
        </div>
    </div>

    <!-- 模态框保持不变 -->
    <div id="authModal" class="modal">
        <div class="modal-content auth-modal-content">
            <div class="modal-header">
                <h2 id="authModalTitle">登录</h2>
                <span class="close-auth">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="authUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="authPassword" placeholder="请输入密码">
                </div>
            </div>
            <div class="modal-footer" style="flex-direction: column; gap: 10px;">
                <div style="display:flex; gap:10px; width:100%;">
                    <button id="authSubmitBtn" class="btn btn-primary" style="flex:1;">登录</button>
                    <button id="webauthnLoginBtn" class="btn btn-secondary" title="使用指纹/面容登录" style="padding: 10px 15px;">
                        <i class="fas fa-fingerprint"></i>
                    </button>
                </div>
                <div class="auth-switch" style="text-align: center; font-size: 13px; color: #666;">
                    <span id="authSwitchText">没有账号？</span>
                    <a href="#" id="authSwitchBtn" style="color: var(--primary); font-weight: 600;">去注册</a>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Version History Modal -->
    <div id="versionModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>历史版本</h2>
                <span class="close-version">&times;</span>
            </div>
            <div class="modal-body">
                <div id="versionList" class="version-list"></div>
                <div id="versionPreview" class="version-preview markdown-body" style="display:none; margin-top:20px; padding:15px; border:1px solid #eee; border-radius:8px; max-height:300px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <!-- Daily Review Modal -->
    <div id="reviewModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2>每日回顾</h2>
                <span class="close-review">&times;</span>
            </div>
            <div class="modal-body">
                <div id="reviewList" class="notes-stream"></div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content" style="max-width: 480px;">
            <div class="modal-header">
                <h2>分享笔记</h2>
                <span class="close-share">&times;</span>
            </div>
            <div class="modal-body">
                <!-- 分享链接 -->
                <div class="share-section">
                    <label style="font-size: 13px; color: #666; margin-bottom: 8px; display: block;">分享链接</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="shareUrl" class="share-url-input" readonly style="flex: 1; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; background: #f8fafc;">
                        <button id="copyShareUrl" class="btn btn-primary" style="padding: 10px 14px;">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>

                <!-- 访问设置 -->
                <div class="share-section" style="margin-top: 20px;">
                    <label style="font-size: 13px; color: #666; margin-bottom: 12px; display: block;">访问设置</label>

                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
                        <input type="checkbox" id="sharePasswordEnabled" style="width: 16px; height: 16px;">
                        <label for="sharePasswordEnabled" style="font-size: 14px; cursor: pointer;">设置密码</label>
                        <input type="password" id="sharePassword" placeholder="输入密码" disabled style="flex: 1; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px;">
                    </div>

                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label style="font-size: 14px;">有效期</label>
                        <select id="shareExpires" style="flex: 1; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; background: white;">
                            <option value="0">永久有效</option>
                            <option value="24">1天后过期</option>
                            <option value="168">7天后过期</option>
                            <option value="720">30天后过期</option>
                        </select>
                    </div>
                </div>

                <!-- 预览卡片 -->
                <div class="share-section" style="margin-top: 24px;">
                    <label style="font-size: 13px; color: #666; margin-bottom: 12px; display: block;">分享卡片预览</label>
                    <div id="shareCard" class="share-card">
                        <div class="share-card-title" id="shareCardTitle">笔记标题</div>
                        <div class="share-card-content markdown-body" id="shareCardContent">笔记内容摘要...</div>
                        <div class="share-card-tags" id="shareCardTags" style="display: none;"></div>
                        <div class="share-card-footer">
                            <span class="share-card-date" id="shareCardDate">2024年1月1日</span>
                            <span class="share-card-brand">📝 流光笔记</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="gap: 10px; padding-top: 16px; border-top: 1px solid #f1f5f9;">
                <button id="downloadShareCard" class="btn btn-secondary" style="flex: 1;">
                    <i class="fas fa-download" style="margin-right: 6px;"></i>下载卡片
                </button>
                <button id="updateShare" class="btn btn-primary" style="flex: 1;">
                    <i class="fas fa-check" style="margin-right: 6px;"></i>保存设置
                </button>
            </div>
        </div>
    </div>

    <!-- Shares Management Modal -->
    <div id="sharesModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>我的分享</h2>
                <span class="close-shares">&times;</span>
            </div>
            <div class="modal-body">
                <div id="sharesList" class="version-list"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/main.js"></script>
    {% if show_login %}
    <script>
        // Auto show login modal when redirected from blog login link
        // Smart login: Try WebAuthn first if this device has used it before
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(async () => {
                // 检查是否已登录
                const userProfile = document.getElementById('userProfile');
                if (userProfile && userProfile.style.display !== 'none') {
                    return; // 已登录，不需要显示登录框
                }

                // 智能登录：如果此设备曾绑定 WebAuthn，优先尝试生物识别
                if (localStorage.getItem('has_webauthn') === 'true' && window.PublicKeyCredential) {
                    // 触发侧边栏登录按钮的点击事件，它会自动尝试 WebAuthn
                    const showLoginBtn = document.getElementById('showLoginBtn');
                    if (showLoginBtn) {
                        showLoginBtn.click();
                        return;
                    }
                }

                // 否则直接显示登录模态框
                const authModal = document.getElementById('authModal');
                if (authModal) {
                    authModal.style.display = 'block';
                    authModal.dataset.mode = 'login';
                    document.getElementById('authModalTitle').textContent = '登录';
                    document.getElementById('authSubmitBtn').textContent = '登录';

                    // 检查是否允许注册，隐藏注册切换
                    fetch('/api/auth/can-register')
                        .then(r => r.json())
                        .then(data => {
                            const switchContainer = document.querySelector('.auth-switch');
                            if (switchContainer && !data.can_register) {
                                switchContainer.style.display = 'none';
                            }
                        });

                    document.getElementById('authUsername').focus();
                }
            }, 300);
        });
    </script>
    {% endif %}
</body>
</html>
