<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 轻笔记</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h1>系统设置</h1>
        </div>

        <!-- 基本设置 -->
        <div class="settings-section">
            <div class="section-title"><i class="fas fa-sliders-h"></i> 基本设置</div>
            <div class="form-row">
                <label>网站标题</label>
                <input type="text" id="siteTitle" placeholder="轻笔记">
            </div>
            <div class="form-row">
                <label>SEO 描述</label>
                <input type="text" id="siteDesc" placeholder="简单记录生活">
            </div>
            <div class="form-row" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveBasicSettings()">
                    <i class="fas fa-save"></i> 保存基本设置
                </button>
            </div>
        </div>

        <!-- AI 设置 -->
        <div class="settings-section">
            <div class="section-title"><i class="fas fa-robot"></i> AI 模型管理</div>
            <div class="form-row">
                <p class="help-text" style="margin-bottom: 20px;">
                    配置 OpenAI 兼容的 API 模型（如 DeepSeek, ChatGPT, Local Ollama）。
                    激活后的模型将用于自动摘要、润色和标签生成。
                </p>
                <div id="aiProvidersList" class="providers-list">
                    <!-- Providers will be loaded here -->
                </div>
                <div style="margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="showAddProviderModal()">
                        <i class="fas fa-plus"></i> 添加新模型
                    </button>
                </div>
            </div>
        </div>

        <!-- Custom Prompts Settings -->
        <div class="settings-section">
            <div class="section-title"><i class="fas fa-magic"></i> 自定义 AI 指令</div>
            <div class="form-row">
                <p class="help-text" style="margin-bottom: 20px;">
                    定义出现在"魔术棒"菜单中的快捷指令。
                </p>
                <div id="customPromptsList" class="providers-list">
                    <!-- Custom Prompts will be loaded here -->
                </div>
                <div style="margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="showAddPromptModal()">
                        <i class="fas fa-plus"></i> 添加新指令
                    </button>
                </div>
            </div>
        </div>

        <!-- 安全设置 -->
        <div class="settings-section">
            <div class="section-title"><i class="fas fa-shield-alt"></i> 安全设置</div>
            <div class="form-row">
                <label>当前密码</label>
                <input type="password" id="currentPassword">
            </div>
            <div class="form-row">
                <label>新密码</label>
                <input type="password" id="newPassword">
            </div>
            <div class="form-row" style="margin-top: 20px;">
                <button class="btn btn-danger" onclick="changePassword()">
                    <i class="fas fa-key"></i> 修改密码
                </button>
            </div>
        </div>

        <!-- 数据管理 -->
        <div class="settings-section">
            <div class="section-title"><i class="fas fa-database"></i> 数据管理</div>
            <div class="form-row">
                <p class="help-text">将所有笔记导出为 JSON 格式进行备份。</p>
                <button class="btn btn-outline" onclick="exportData()">
                    <i class="fas fa-file-export"></i> 导出所有数据
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Add Provider Modal -->
    <div id="providerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加 AI 模型</h2>
                <span class="close" onclick="closeProviderModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="providerId">
                <div class="form-row">
                    <label>显示名称</label>
                    <input type="text" id="providerName" placeholder="例如: DeepSeek V3">
                </div>
                <div class="form-row">
                    <label>API Base URL</label>
                    <input type="text" id="providerBaseUrl" placeholder="https://api.deepseek.com/v1">
                </div>
                <div class="form-row">
                    <label>API Key</label>
                    <input type="password" id="providerApiKey" placeholder="sk-...">
                </div>
                <div class="form-row">
                    <label>模型名称 (Model ID)</label>
                    <input type="text" id="providerModel" placeholder="deepseek-chat">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeProviderModal()">取消</button>
                <button class="btn btn-primary" onclick="saveProvider()">保存</button>
            </div>
        </div>
    </div>

    <!-- Add Custom Prompt Modal -->
    <div id="promptModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加自定义指令</h2>
                <span class="close" onclick="closePromptModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="promptId">
                <div class="form-row">
                    <label>指令名称 (菜单显示)</label>
                    <input type="text" id="promptName" placeholder="例如: 翻译成英文">
                </div>
                <div class="form-row">
                    <label>系统提示词 (System Prompt)</label>
                    <textarea id="promptSystem" placeholder="例如: 你是一个专业的翻译助手。" rows="3" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;"></textarea>
                </div>
                <div class="form-row">
                    <label>用户提示词模板 (User Prompt)</label>
                    <p class="help-text" style="font-size:0.8rem; margin-top:5px;">使用 {content} 代表选中的文本。</p>
                    <textarea id="promptTemplate" placeholder="例如: 将以下文本翻译成英文：\n\n{content}" rows="4" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePromptModal()">取消</button>
                <button class="btn btn-primary" onclick="savePrompt()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // Load settings on init
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            loadProviders();
            loadCustomPrompts();
        });

        // ... existing loadSettings ...

        async function loadProviders() {
            try {
                const response = await fetch('/api/ai/providers');
                const providers = await response.json();
                renderProviders(providers);
            } catch (error) {
                console.error('Failed to load providers');
            }
        }

        function renderProviders(providers) {
            const list = document.getElementById('aiProvidersList');
            list.innerHTML = '';

            if (providers.length === 0) {
                list.innerHTML = '<div class="empty-text">暂无模型，请添加</div>';
                return;
            }

            providers.forEach(p => {
                const item = document.createElement('div');
                item.className = `provider-item ${p.is_active ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="provider-info">
                        <div class="provider-name">
                            ${p.name}
                            ${p.is_active ? '<span class="badge">使用中</span>' : ''}
                        </div>
                        <div class="provider-detail">${p.model} | ${p.base_url}</div>
                    </div>
                    <div class="provider-actions">
                        ${!p.is_active ? `<button class="btn btn-sm btn-outline" onclick="activateProvider('${p.id}')">启用</button>` : ''}
                        <button class="btn btn-sm btn-secondary" onclick="editProvider('${p.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProvider('${p.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function showAddProviderModal() {
            document.getElementById('providerId').value = '';
            document.getElementById('providerName').value = '';
            document.getElementById('providerBaseUrl').value = '';
            document.getElementById('providerApiKey').value = '';
            document.getElementById('providerModel').value = '';
            document.getElementById('providerModal').style.display = 'block';
        }

        function closeProviderModal() {
            document.getElementById('providerModal').style.display = 'none';
        }

        let currentProviders = []; // Cache for edit

        async function saveProvider() {
            const id = document.getElementById('providerId').value;
            const name = document.getElementById('providerName').value;
            const baseUrl = document.getElementById('providerBaseUrl').value;
            const apiKey = document.getElementById('providerApiKey').value;
            const model = document.getElementById('providerModel').value;

            if (!name || !baseUrl || !apiKey || !model) {
                showToast('请填写完整信息');
                return;
            }

            try {
                const response = await fetch('/api/ai/providers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, name, base_url: baseUrl, api_key: apiKey, model })
                });
                const data = await response.json();
                if (response.ok) {
                    showToast('保存成功');
                    closeProviderModal();
                    renderProviders(data.providers);
                } else {
                    showToast('保存失败');
                }
            } catch (error) {
                showToast('保存失败');
            }
        }

        async function deleteProvider(id) {
            if (!confirm('确定删除此模型配置吗？')) return;
            try {
                await fetch(`/api/ai/providers/${id}`, { method: 'DELETE' });
                loadProviders();
                showToast('已删除');
            } catch (error) {
                showToast('删除失败');
            }
        }

        async function activateProvider(id) {
            try {
                await fetch('/api/ai/providers/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                loadProviders();
                showToast('已切换模型');
            } catch (error) {
                showToast('切换失败');
            }
        }

        // === Custom Prompts Logic ===
        async function loadCustomPrompts() {
            try {
                const response = await fetch('/api/ai/custom_prompts');
                const prompts = await response.json();
                renderCustomPrompts(prompts);
            } catch (error) {
                console.error('Failed to load prompts');
            }
        }

        function renderCustomPrompts(prompts) {
            const list = document.getElementById('customPromptsList');
            list.innerHTML = '';

            if (prompts.length === 0) {
                list.innerHTML = '<div class="empty-text">暂无自定义指令</div>';
                return;
            }

            prompts.forEach(p => {
                const item = document.createElement('div');
                item.className = 'provider-item'; // Reuse same style
                item.innerHTML = `
                    <div class="provider-info">
                        <div class="provider-name">${p.name}</div>
                        <div class="provider-detail" style="font-size:0.8rem; color:#888;">${p.template.substring(0, 50)}...</div>
                    </div>
                    <div class="provider-actions">
                        <button class="btn btn-sm btn-secondary" onclick="editPrompt('${p.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deletePrompt('${p.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function showAddPromptModal() {
            document.getElementById('promptId').value = '';
            document.getElementById('promptName').value = '';
            document.getElementById('promptSystem').value = '你是一个乐于助人的助手。';
            document.getElementById('promptTemplate').value = '{content}';
            document.getElementById('promptModal').style.display = 'block';
        }

        function closePromptModal() {
            document.getElementById('promptModal').style.display = 'none';
        }

        async function savePrompt() {
            const id = document.getElementById('promptId').value;
            const name = document.getElementById('promptName').value;
            const system = document.getElementById('promptSystem').value;
            const template = document.getElementById('promptTemplate').value;

            if (!name || !template) {
                showToast('请填写完整信息');
                return;
            }

            try {
                const response = await fetch('/api/ai/custom_prompts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, name, system_prompt: system, template })
                });
                if (response.ok) {
                    showToast('保存成功');
                    closePromptModal();
                    loadCustomPrompts();
                } else {
                    showToast('保存失败');
                }
            } catch (error) {
                showToast('保存失败');
            }
        }

        async function deletePrompt(id) {
            if (!confirm('确定删除此指令吗？')) return;
            try {
                await fetch(`/api/ai/custom_prompts/${id}`, { method: 'DELETE' });
                loadCustomPrompts();
                showToast('已删除');
            } catch (error) {
                showToast('删除失败');
            }
        }

        async function editPrompt(id) {
             const response = await fetch('/api/ai/custom_prompts');
             const prompts = await response.json();
             const p = prompts.find(x => x.id === id);
             if (p) {
                document.getElementById('promptId').value = p.id;
                document.getElementById('promptName').value = p.name;
                document.getElementById('promptSystem').value = p.system_prompt;
                document.getElementById('promptTemplate').value = p.template;
                document.getElementById('promptModal').style.display = 'block';
             }
        }

        // Edit helper needs cache or refetch. Since we don't have full list locally in robust way,
        // let's fetch list again inside edit or store globally.
        // For simplicity, let's just make get_providers return full objects and we rely on UI not having sensitive data visible?
        // Actually our API returns full config including key. In a real app we might mask key.
        // For personal app, it's fine.

        async function editProvider(id) {
             const response = await fetch('/api/ai/providers');
             const providers = await response.json();
             const p = providers.find(x => x.id === id);
             if (p) {
                document.getElementById('providerId').value = p.id;
                document.getElementById('providerName').value = p.name;
                document.getElementById('providerBaseUrl').value = p.base_url;
                document.getElementById('providerApiKey').value = p.api_key;
                document.getElementById('providerModel').value = p.model;
                document.getElementById('providerModal').style.display = 'block';
             }
        }


        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const data = await response.json();

                if (data.site_title) document.getElementById('siteTitle').value = data.site_title;
                if (data.site_desc) document.getElementById('siteDesc').value = data.site_desc;
                if (data.ai_provider) document.getElementById('aiProvider').value = data.ai_provider;
                // Don't show API key for security usually, or masked
            } catch (error) {
                console.error('Failed to load settings');
            }
        }

        async function saveBasicSettings() {
            const siteTitle = document.getElementById('siteTitle').value;
            const siteDesc = document.getElementById('siteDesc').value;

            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        site_title: siteTitle,
                        site_desc: siteDesc
                    })
                });

                if (response.ok) {
                    showToast('设置已保存');
                } else {
                    showToast('保存失败');
                }
            } catch (error) {
                showToast('保存失败');
            }
        }

        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            if (!currentPassword || !newPassword) {
                showToast('请填写完整');
                return;
            }

            try {
                const response = await fetch('/api/settings/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: currentPassword, new_password: newPassword })
                });
                const data = await response.json();

                if (response.ok) {
                    showToast('密码修改成功');
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                } else {
                    showToast(data.error || '修改失败');
                }
            } catch (error) {
                showToast('修改失败');
            }
        }

        function exportData() {
            // Simple export logic - fetch all notes and download as JSON
            window.location.href = '/api/notes?per_page=10000'; // Reuse existing API or make a dedicated one
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }
    </script>
</body>
</html>
